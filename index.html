<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>RESONANCE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:17px}
body{background:#07070f;color:#d0d0e8;font-family:'IBM Plex Mono',monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.gbg{position:fixed;inset:0;background-image:linear-gradient(rgba(100,100,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(100,100,255,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 1rem;height:34px;border-bottom:1px solid rgba(255,255,255,0.07);background:#07070f;flex-shrink:0;z-index:10;position:relative}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;letter-spacing:0.1em;color:#fff}
.logo em{color:#64ffda;font-style:normal}
.logo small{font-size:0.5rem;opacity:0.22;font-family:'IBM Plex Mono',monospace;margin-left:0.5rem}
.hstats{display:flex;align-items:center;gap:1.1rem}
.hs .v{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:#fff;line-height:1}
.hs .l{font-size:0.5rem;letter-spacing:0.07em;text-transform:uppercase;color:rgba(255,255,255,0.44)}
.ldot{width:6px;height:6px;border-radius:50%;background:#64ffda;box-shadow:0 0 5px #64ffda;animation:blink 2s infinite}
.ldot.off{background:#ff4757;box-shadow:0 0 5px #ff4757;animation:none}
.ldot.wait{background:#ffc800;box-shadow:0 0 5px #ffc800}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}
.lbl{display:flex;align-items:center;gap:0.35rem;font-size:0.58rem;letter-spacing:0.06em}
.resbar{height:2px;background:rgba(255,255,255,0.03);flex-shrink:0}
.resbar-fill{height:100%;background:#f72585;transition:width 0.6s;width:0}

/* FILTER BAR */
.fbar{display:flex;align-items:center;gap:0.28rem;padding:0 1rem;height:24px;border-bottom:1px solid rgba(255,255,255,0.05);background:#07070f;flex-shrink:0;z-index:5;position:relative}
.fbl{font-size:0.52rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.40);margin-right:0.15rem}
.fb{padding:1px 6px;border-radius:2px;font-size:0.56rem;cursor:pointer;border:1px solid rgba(255,255,255,0.07);background:transparent;color:rgba(255,255,255,0.38);font-family:'IBM Plex Mono',monospace;transition:all 0.15s}
.fb:hover{color:rgba(255,255,255,0.55)}
.fb.on{border-color:#64ffda;color:#64ffda;background:rgba(100,255,218,0.06)}
.fb.all.on{border-color:rgba(255,255,255,0.42);color:rgba(255,255,255,0.45);background:rgba(255,255,255,0.03)}
.fsep{width:1px;height:12px;background:rgba(255,255,255,0.06);margin:0 0.12rem}
.ft{padding:1px 6px;border-radius:2px;font-size:0.56rem;cursor:pointer;border:1px solid rgba(255,255,255,0.05);background:transparent;color:rgba(255,255,255,0.44);font-family:'IBM Plex Mono',monospace;transition:all 0.15s}
.ft.on{background:rgba(255,71,87,0.1);border-color:rgba(255,71,87,0.3);color:#ff6b6b}

/* GRID */
.body{display:grid;grid-template-columns:2fr 1.35fr 1fr;gap:1px;background:rgba(255,255,255,0.05);flex:1;overflow:hidden;position:relative;z-index:1}
.col{background:#07070f;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.ph{display:flex;justify-content:space-between;align-items:center;padding:0 0.8rem;height:26px;border-bottom:1px solid rgba(255,255,255,0.05);flex-shrink:0;font-size:0.56rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.44)}
.ph .ac{color:#64ffda}.ph .rd{color:#ff4757}.ph .gd{color:#ffc800}.ph .pk{color:#f72585}
.pb{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0}
.pb::-webkit-scrollbar{width:2px}
.pb::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08)}

/* ── PINNED CARDS (живі) ── */
.pinned-section{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0;border-bottom:1px solid rgba(255,255,255,0.06)}.pinned-section::-webkit-scrollbar{width:2px}.pinned-section::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08)}
.pc{margin:0.45rem 0.5rem;padding:0.65rem 0.75rem;border-radius:2px;position:relative;transition:border-color 0.3s,background 0.3s}
.pc.res{border:1.5px solid #f72585;background:rgba(247,37,133,0.07)}
.pc-xl{padding:0.65rem 0.75rem}
.pc-lg{padding:0.5rem 0.7rem}
.pc-sm{padding:0.38rem 0.7rem}
.pc-xs{padding:0.28rem 0.8rem;border-radius:0;border-left-width:2px;border-right:none;border-top:none;border-bottom:1px solid rgba(255,255,255,0.04)!important}
.pc-top-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.18rem}
.pc-score-badge{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;line-height:1;text-align:right;flex-shrink:0}
.pc-score-badge span{display:block;font-family:'IBM Plex Mono',monospace;font-size:0.46rem;opacity:0.5;text-align:center}
.pc.mul{border:1px solid rgba(255,200,0,0.35);background:rgba(255,200,0,0.03)}
.pc.sng{border:1px solid rgba(255,71,87,0.2);background:rgba(255,71,87,0.02)}
.pc-pin{position:absolute;top:0.5rem;right:0.5rem;font-size:0.48rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.44);padding:1px 5px;border:1px solid rgba(255,255,255,0.1);border-radius:2px}
.pc-label{font-size:0.52rem;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:0.22rem}
.pc-label.pk{color:#f72585}.pc-label.gd{color:#ffc800}.pc-label.rd{color:#ff4757}
.pc-title{font-size:1.1rem;color:#ffffff;line-height:1.25;margin-bottom:0.14rem;font-weight:600}
.pc-title a{color:inherit;text-decoration:none}
.pc-title a:hover{color:#64ffda}
.pc-meta{font-size:0.6rem;color:rgba(255,255,255,0.52);margin-bottom:0.28rem}

/* Progress bar */
.pc-progress{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-bottom:0.3rem}
.pc-prog-fill{height:100%;border-radius:2px;transition:width 0.5s,background 0.5s}

/* Stats row */
.pc-stats{display:flex;gap:0.8rem;margin-bottom:0.28rem;align-items:center}
.pc-stat{display:flex;flex-direction:column;align-items:center}
.pc-stat-v{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;line-height:1}
.pc-stat-l{font-size:0.46rem;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.38)}

/* Badges */
.pc-badges{display:flex;flex-wrap:wrap;gap:0.22rem;margin-bottom:0.28rem}
.pb2{padding:2px 7px;border-radius:2px;font-size:0.56rem}
.pc-signals{display:flex;gap:0.3rem;flex-wrap:wrap;margin-bottom:0.25rem}
.sig{padding:2px 7px;border-radius:2px;font-size:0.54rem;font-weight:600}
.sig-war{background:rgba(255,71,87,0.14);color:#ff6b6b;border:1px solid rgba(255,71,87,0.25)}
.sig-ret{background:rgba(255,200,0,0.12);color:#ffc800;border:1px solid rgba(255,200,0,0.25)}
.sig-prot{background:rgba(255,71,87,0.1);color:#ff8888;border:1px solid rgba(255,71,87,0.2)}
.sig-trend{background:rgba(100,255,218,0.1);color:#64ffda;border:1px solid rgba(100,255,218,0.22)}

.pc-desc{font-size:0.61rem;color:rgba(255,255,255,0.5);line-height:1.5;font-style:italic;margin-bottom:0.28rem;border-left:2px solid rgba(255,255,255,0.08);padding-left:0.5rem}
.pc-pv{font-size:0.62rem;margin-bottom:0.22rem}
.pc-actions{display:flex;gap:0.3rem;align-items:center}
.btn-g{padding:2px 9px;border-radius:2px;font-size:0.56rem;cursor:pointer;border:1px solid rgba(255,255,255,0.12);background:transparent;color:rgba(255,255,255,0.42);font-family:'IBM Plex Mono',monospace;text-decoration:none;display:inline-block;transition:all 0.15s}
.btn-g:hover{color:#fff;border-color:rgba(255,255,255,0.45)}
.btn-ai{padding:2px 9px;border-radius:2px;font-size:0.56rem;cursor:pointer;border:1px solid rgba(100,255,218,0.28);background:rgba(100,255,218,0.06);color:#64ffda;font-family:'IBM Plex Mono',monospace;transition:all 0.15s}
.btn-ai:hover{background:rgba(100,255,218,0.14)}
.pc-timer{font-size:0.52rem;color:rgba(255,255,255,0.42);margin-left:auto}

/* ── STREAM LIST (нові) ── */
.stream-section{flex-shrink:0;max-height:180px;display:flex;flex-direction:column;overflow:hidden}
.sec-header{padding:0.22rem 0.8rem;font-size:0.5rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.40);border-bottom:1px solid rgba(255,255,255,0.04);background:rgba(255,255,255,0.015);flex-shrink:0}
.al{display:flex;align-items:center;gap:0.45rem;padding:0.3rem 0.8rem;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:background 0.15s}
.al:hover{background:rgba(255,255,255,0.02)}
.al-label{font-size:0.5rem;color:rgba(255,255,255,0.44);flex-shrink:0;width:52px}
.al-title{font-size:0.82rem;color:rgba(255,255,255,0.85);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.al-meta{font-size:0.52rem;color:rgba(255,255,255,0.44);flex-shrink:0}
.al.highlight .al-title{color:#fff}

/* ── SUSTAINED ── */
.sust-sec{flex-shrink:0;border-top:1px solid rgba(255,255,255,0.05)}
.si{display:flex;align-items:flex-start;gap:0.38rem;padding:0.3rem 0.8rem;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:background 0.15s}
.si:hover{background:rgba(255,255,255,0.02)}
.si-sc{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;flex-shrink:0;width:24px;text-align:center;line-height:1.2}
.si-nm{font-size:0.76rem;color:rgba(255,255,255,0.88);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-me{display:flex;gap:0.25rem;margin-top:2px;font-size:0.5rem;color:rgba(255,255,255,0.38)}
.si-bar{width:22px;height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;flex-shrink:0;margin-top:7px}
.si-fill{height:100%;border-radius:2px}

/* ── TRENDING ── */
.ti-top{margin:0.42rem 0.5rem 0;padding:0.55rem 0.65rem;border-radius:2px;border:1px solid rgba(100,255,218,0.15);background:rgba(100,255,218,0.025);cursor:pointer;transition:background 0.15s}
.ti-top:hover{background:rgba(100,255,218,0.055)}
.ti-top-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.18rem}
.ti-top-name{font-size:0.95rem;color:#ffffff;flex:1;padding-right:0.5rem;font-weight:600}
.ti-top-pct{font-family:'Bebas Neue',sans-serif;font-size:1.55rem;color:#64ffda;line-height:1}
.ti-top-sub{display:flex;justify-content:space-between;align-items:center}
.ti-top-vw{font-size:0.6rem;color:rgba(255,255,255,0.48)}
.ti-top-acts{display:flex;gap:0.22rem}
.ti-btn{font-size:0.54rem;padding:1px 5px;border-radius:2px;cursor:pointer;text-decoration:none;display:inline-block;transition:all 0.15s;font-family:'IBM Plex Mono',monospace}
.ti-btn-g{border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.45);background:transparent}
.ti-btn-g:hover{color:rgba(255,255,255,0.6)}
.ti-btn-ai{border:1px solid rgba(100,255,218,0.22);color:#64ffda;background:rgba(100,255,218,0.05)}
.ti-btn-ai:hover{background:rgba(100,255,218,0.12)}
.ti{display:flex;align-items:center;gap:0.38rem;padding:0.3rem 0.8rem;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:background 0.15s}
.ti:hover{background:rgba(255,255,255,0.02)}
.ti.res{border-left:2px solid #f72585;background:rgba(247,37,133,0.025)}
.ti-ic{font-size:0.7rem;flex-shrink:0;width:13px}
.ti-nm{font-size:0.78rem;color:rgba(255,255,255,0.85);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ti-vw{font-size:0.55rem;color:rgba(255,255,255,0.44);flex-shrink:0;width:30px;text-align:right}
.ti-dl{font-family:'Bebas Neue',sans-serif;font-size:0.88rem;flex-shrink:0;width:50px;text-align:right}
.ti-acts{display:flex;gap:2px;flex-shrink:0}

/* ── LIVE FEED ── */
.spd{display:flex;align-items:center;gap:0.5rem;padding:0.38rem 0.8rem;border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0}
.spd-v{font-family:'Bebas Neue',sans-serif;font-size:1.75rem;color:#fff;line-height:1}
.spd-l{font-size:0.52rem;text-transform:uppercase;color:rgba(255,255,255,0.44);letter-spacing:0.06em}
.spd-t{font-size:0.56rem;margin-top:2px}
.spl{display:flex;align-items:flex-end;gap:2px;height:20px;flex:1}
.sc{border-radius:1px 1px 0 0;flex:1;min-width:3px}
.hmap{padding:0.28rem 0.8rem;border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0}
.hmap-g{display:grid;grid-template-columns:repeat(24,1fr);gap:2px;height:11px}
.hm{border-radius:1px}
.fi{padding:0.32rem 0.8rem;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:background 0.15s}
.fi:hover{background:rgba(255,255,255,0.02)}
.fi.spike{border-left:2px solid #64ffda}
.fi.high{border-left:2px solid #ffc800}
.fi-t{font-size:0.8rem;color:rgba(255,255,255,0.88);text-decoration:none;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi-t:hover{color:#64ffda}
.fi-m{display:flex;gap:0.22rem;margin-top:0.1rem;align-items:center}
.tg{padding:1px 4px;border-radius:1px;font-size:0.5rem}
.tg-b{background:rgba(100,100,255,0.13);color:#8888ff}
.tg-a{background:rgba(255,200,0,0.1);color:#ffc800}
.tg-u{background:rgba(100,255,218,0.07);color:#64ffda}
.tg-n{background:rgba(100,255,218,0.13);color:#64ffda;font-weight:600}
.tg-m{background:rgba(255,200,0,0.15);color:#ffc800;font-weight:600}
.fi-lang{font-size:0.5rem;color:rgba(255,255,255,0.42)}
.langs-sec{border-top:1px solid rgba(255,255,255,0.05);flex-shrink:0}
.li{display:flex;align-items:center;gap:0.38rem;padding:0.2rem 0.8rem}
.li-c{font-size:0.56rem;width:16px;color:rgba(255,255,255,0.38)}
.li-t{flex:1;height:4px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden}
.li-f{height:100%;border-radius:2px;transition:width 0.5s}
.li-n{font-size:0.56rem;color:rgba(255,255,255,0.42);width:26px;text-align:right}
.asl{padding:0.25rem 0.8rem;border-top:1px solid rgba(255,255,255,0.04);flex-shrink:0}
.asl-l{font-size:0.48rem;color:rgba(255,255,255,0.38);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:2px}
.asl-g{display:flex;align-items:flex-end;gap:2px;height:16px}
.ab{flex:1;min-width:3px;border-radius:1px 1px 0 0}

/* AI MODAL */
#aiModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9999;align-items:center;justify-content:center}
.aim-box{background:#0d0d1a;border:1px solid rgba(100,255,218,0.2);border-radius:3px;width:min(580px,92vw);max-height:80vh;display:flex;flex-direction:column;overflow:hidden;font-family:'IBM Plex Mono',monospace}
.aim-hdr{display:flex;justify-content:space-between;align-items:center;padding:0.62rem 0.9rem;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0}
.aim-title{font-size:0.88rem;color:#fff;font-weight:600}
.aim-close{background:transparent;border:none;color:rgba(255,255,255,0.45);font-size:1.3rem;cursor:pointer;line-height:1;padding:0}
.aim-body{padding:0.8rem 0.9rem;overflow-y:auto;flex:1;font-size:0.75rem;line-height:1.75;color:#d0d0e8}
.aim-src{font-size:0.5rem;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.25rem}
.aim-item{margin-bottom:0.38rem;padding-bottom:0.38rem;border-bottom:1px solid rgba(255,255,255,0.05)}
.aim-item a{color:rgba(255,255,255,0.92);text-decoration:none;font-size:0.74rem;line-height:1.4;display:block}
.aim-item a:hover{color:#64ffda}
.aim-item-meta{font-size:0.54rem;color:rgba(255,255,255,0.44);margin-top:1px}
.aim-links{padding-top:0.45rem;border-top:1px solid rgba(255,255,255,0.06);display:flex;gap:1rem}
.aim-links a{font-size:0.56rem;color:rgba(100,255,218,0.6);text-decoration:none}
.hint{padding:0.6rem 0.8rem;font-size:0.58rem;color:rgba(255,255,255,0.38);line-height:1.6}
.stimer{font-size:0.5rem;color:rgba(255,255,255,0.38)}

/* pulse animation for live updates */
@keyframes pulse{0%{opacity:1}50%{opacity:0.6}100%{opacity:1}}
.live-update{animation:pulse 0.4s ease}
</style>
</head>
<body>
<div class="gbg"></div>

<div class="hdr">
  <div style="display:flex;align-items:center;gap:0.8rem">
    <div class="logo">RESO<em>NANCE</em><small>// signal detector</small></div>
    <div class="stimer" id="stimer">0:00</div>
  </div>
  <div class="hstats">
    <div class="hs"><div class="v" id="hEpm">0</div><div class="l">прав/хв</div></div>
    <div class="hs"><div class="v" id="hTotal">0</div><div class="l">всього</div></div>
    <div class="hs"><div class="v" id="hAnom" style="color:#ff4757">0</div><div class="l">аномалій</div></div>
    <div class="hs"><div class="v" id="hMul" style="color:#ffc800">0</div><div class="l">мульти</div></div>
    <div class="hs"><div class="v" id="hRes" style="color:#f72585">0</div><div class="l">★</div></div>
    <div class="hs"><div class="v" id="hTg" style="color:#64ffda">0</div><div class="l">tg</div></div>
    <div class="hs"><div class="v" id="hArt">0</div><div class="l">статей</div></div>
    <div class="lbl"><div class="ldot wait" id="dot"></div><span id="stxt">connecting</span></div>
  </div>
</div>
<div class="resbar"><div class="resbar-fill" id="resFill"></div></div>

<div class="fbar">
  <span class="fbl">мова:</span>
  <button class="fb all on" data-l="all" onclick="setLang(this)">всі</button>
  <button class="fb" data-l="en" onclick="setLang(this)">en</button>
  <button class="fb" data-l="de" onclick="setLang(this)">de</button>
  <button class="fb" data-l="fr" onclick="setLang(this)">fr</button>
  <button class="fb" data-l="es" onclick="setLang(this)">es</button>
  <button class="fb" data-l="ru" onclick="setLang(this)">ru</button>
  <button class="fb" data-l="uk" onclick="setLang(this)">uk</button>
  <button class="fb" data-l="ja" onclick="setLang(this)">ja</button>
  <div class="fsep"></div>
  <span class="fbl">тип:</span>
  <button class="ft" data-tp="СМЕРТЬ" onclick="toggleType(this)">💀</button>
  <button class="ft" data-tp="ПОЛІТИК" onclick="toggleType(this)">🏛</button>
  <button class="ft" data-tp="БІЗНЕС" onclick="toggleType(this)">💼</button>
  <button class="ft" data-tp="ГЕОПОЛІТИКА" onclick="toggleType(this)">🌏</button>
  <button class="ft" data-tp="СПОРТ" onclick="toggleType(this)">⚽</button>
  <button class="ft" data-tp="КУЛЬТУРА" onclick="toggleType(this)">🎭</button>
</div>

<div class="body">
  <!-- COL 1: ANOMALIES -->
  <div class="col">
    <div class="ph">
      <span>⚡ аномалії</span>
      <span><span class="pk" id="cntR">0</span><span style="opacity:0.2"> ★</span> <span class="gd" id="cntM">0</span><span style="opacity:0.2"> mul</span> <span class="rd" id="cntS">0</span><span style="opacity:0.2"> sng</span></span>
    </div>
    <!-- PINNED — живі картки -->
    <div class="pinned-section" id="pinnedSection">
      <div class="hint">Очікуємо перші аномалії...</div>
    </div>
    <!-- STREAM — нові компактні -->
    <div class="stream-section">
      <div class="sec-header">Нові · <span id="streamCnt">0</span></div>

function drawSpeedo(v,mx){
  const c=document.getElementById('speedo');if(!c)return;
  const ctx=c.getContext('2d'),cx=29,cy=30,r=22;
  ctx.clearRect(0,0,58,34);
  ctx.beginPath();ctx.arc(cx,cy,r,Math.PI,2*Math.PI);ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=4;ctx.stroke();
  const p=Math.min(v/mx,1);
  const col=p>0.8?'#ff4757':p>0.5?'#ffc800':'#64ffda';
  if(p>0){ctx.beginPath();ctx.arc(cx,cy,r,Math.PI,Math.PI+p*Math.PI);ctx.strokeStyle=col;ctx.lineWidth=4;ctx.lineCap='round';ctx.stroke();}
  const a=Math.PI+p*Math.PI;
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+(r-5)*Math.cos(a),cy+(r-5)*Math.sin(a));
  ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,2,0,2*Math.PI);ctx.fillStyle=col;ctx.fill();
}
drawSpeedo(0,300);

// ── UPSERT PINNED ──
function upsertPinned(title,wiki,type,edits,editors,lang,url){
  const key=wiki+':'+title;
  const now=Date.now();
  const ir=isRes(title);
  const finalType=ir?'res':type;

  if(!pinned[key]){
    pinned[key]={key,title,wiki,type:finalType,edits,editors,firstSeen:now,lastSeen:now,url,lang,score:0,isWar:false,isRet:0,isProt:false,desc:'',pvText:'',badges:'',trendPct:null};
  } else {
    pinned[key].edits=edits;
    pinned[key].editors=editors;
    pinned[key].lastSeen=now;
    if(ir)pinned[key].type='res';
    // upgrade mul→res if trending
    if(type==='res')pinned[key].type='res';
  }

  // Score
  const s=pinned[key];
  const span=(now-s.firstSeen)/60000;
  s.score=s.edits*1+s.editors*3+Math.min(span/10,20);
  if(s.isRet>0)s.score+=s.isRet*5;

  // Check trending
  const tr=trendData.find(t=>t.article.toLowerCase()===title.toLowerCase());
  if(tr)s.trendPct=tr.delta;

  // Cleanup old pinned (inactive > 2 hours)
  Object.keys(pinned).forEach(k=>{if(now-pinned[k].lastSeen>7200000)delete pinned[k];});

  renderPinned();
}

// ── ADD ANOMALY ──
function addAnom(title,url,lang,hits,eds,type){
  anomCnt++;
  if(type==='res')resCnt++;else if(type==='mul')mulCnt++;else sngCnt++;
  // Add/update pinned card
  upsertPinned(title,'',type,hits,eds,lang,url);
  // Add to stream list (compact)
  const icon=type==='res'?'★':type==='mul'?'👥':'⚡';
  const col=type==='res'?'#f72585':type==='mul'?'#ffc800':'#ff4757';
  const row=document.createElement('div');
  row.className='al '+(type==='res'?'highlight':'');
  row.addEventListener('click',()=>window.open(url,'_blank'));
  row.innerHTML='<div class="al-label" style="color:'+col+'">'+icon+' '+lang+'</div>'
    +'<div class="al-title">'+title+'</div>'
    +'<div class="al-meta">'+new Date().toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'})+'</div>';
  const sl=document.getElementById('streamList');
  if(sl){sl.insertBefore(row,sl.firstChild);while(sl.children.length>40)sl.removeChild(sl.lastChild);}
  streamCnt++;document.getElementById('streamCnt').textContent=streamCnt;
  updHdr();updAnomSpark();
  setTimeout(()=>enrich(title,lang,url,type),800);
}

// ── ENRICH ──
async function enrich(title,lang,url,type){
  try{
    const wiki=lang+'wiki';
    const [mr,pvr]=await Promise.all([
      fetch('https://'+lang+'.wikipedia.org/w/api.php?action=query&prop=categories|langlinks|extracts|info&titles='+encodeURIComponent(title)+'&cllimit=30&clshow=!hidden&lllimit=500&exintro=1&exsentences=2&explaintext=1&inprop=protection&format=json&origin=*'),
      fetch('https://wikimedia.org/api/rest_v1/metrics/pageviews/per-article/'+lang+'.wikipedia/all-access/all-agents/'+encodeURIComponent(title.replace(/ /g,'_'))+'/daily/'+getDateStr(-8)+'/'+getDateStr(0),{headers:{'User-Agent':'ResonanceDash/1.0'}}).catch(()=>null)
    ]);
    const d=await mr.json();const pg=Object.values(d.query?.pages||{})[0];if(!pg)return;
    const cats=(pg.categories||[]).map(c=>c.title.toLowerCase()).join(' ');
    const lc=(pg.langlinks||[]).length+1;
    const ex=pg.extract?pg.extract.split('.')[0].trim():'';
    const isProt=(pg.protection||[]).some(p=>p.type==='edit');
    let pvText='';
    if(pvr&&pvr.ok){try{const pv=await pvr.json();const its=pv.items||[];if(its.length>=2){const td=its[its.length-1].views;const avg=Math.round(its.slice(0,-1).reduce((s,i)=>s+i.views,0)/(its.length-1));const rat=avg>0?(td/avg).toFixed(1):0;const pc=rat>=5?'#ff4757':rat>=2?'#ffc800':'#64ffda';if(td>0)pvText='<span style="color:'+pc+'">👁 '+td.toLocaleString()+' переглядів · ×'+rat+' від норми</span>';}}catch(e){}}

    let atype='стаття',icon='📄',col='#555';
    if(/deaths in 20|died 20/.test(cats)){atype='СМЕРТЬ';icon='💀';col='#ff4757';}
    else if(/politician|president|minister|senator|parliament/.test(cats)){atype='ПОЛІТИК';icon='🏛';col='#f72585';}
    else if(/businessperson|ceo|billionaire|executive/.test(cats)){atype='БІЗНЕС';icon='💼';col='#ffc800';}
    else if(/sportsperson|athlete|footballer|olympic/.test(cats)){atype='СПОРТ';icon='⚽';col='#48cae4';}
    else if(/actor|musician|singer|director|comedian/.test(cats)){atype='КУЛЬТУРА';icon='🎭';col='#b5179e';}
    else if(/military|general|admiral|colonel|commander/.test(cats)){atype='ВІЙСЬКОВІ';icon='🎖';col='#e76f51';}
    else if(/scientist|professor|physicist|biologist/.test(cats)){atype='НАУКА';icon='🔬';col='#64ffda';}
    else if(/strait|canal|waterway|conflict|crisis|war/.test(cats)){atype='ГЕОПОЛІТИКА';icon='🌏';col='#f72585';}
    else if(/football club|association football|league/.test(cats)){atype='ФУТБОЛ';icon='🏆';col='#48cae4';}
    else if(/living people/.test(cats)){atype='ПЕРСОНА';icon='👤';col='#90e0ef';}

    const wl=lc>=50?'🌍('+lc+')':lc>=20?'🌐('+lc+')':lc>=10?'📍('+lc+')':'📌('+lc+')';
    const wc=lc>=50?'#ff4757':lc>=20?'#ffc800':lc>=10?'#64ffda':'#555';
    let badges='<span class="pb2" style="background:'+col+'18;color:'+col+';border:1px solid '+col+'33">'+icon+' '+atype+'</span>'
      +'<span class="pb2" style="background:'+wc+'18;color:'+wc+';border:1px solid '+wc+'33">'+wl+'</span>';

    // Update pinned data
    const key=lang+'wiki:'+title;
    const key2=Object.keys(pinned).find(k=>k.includes(title));
    const target=pinned[key]||pinned[key2];
    if(target){
      target.badges=badges;
      target.desc=ex.slice(0,130)+(ex.length>130?'…':'');
      target.pvText=pvText;
      target.isProt=isProt;
      if(atype==='ГЕОПОЛІТИКА'||atype==='ПОЛІТИК')target.type='res';
      renderPinned();
    }
  }catch(e){}
}

// ── SUSTAINED ──
function updSustained(title,wiki,user,isBot){
  const now=Date.now();const url=getUrl(title,wiki);
  if(!sustained[title])sustained[title]={first:now,last:now,edits:0,editors:new Set(),ret:{},score:0,url};
  const s=sustained[title];s.last=now;s.edits++;
  if(user&&!isBot){
    if(!s.ret[user])s.ret[user]=[];
    const prev=s.ret[user];if(prev.length>0&&now-prev[prev.length-1]>1200000)s.score+=5;
    prev.push(now);s.editors.add(user);
  }
  const span=(s.last-s.first)/60000;
  s.score=s.edits*1+s.editors.size*3+Math.min(span/10,20);
  // Check edit war for pinned
  const pk=wiki+':'+title;const p2=Object.keys(pinned).find(k=>k.includes(title));
  const pt=pinned[pk]||pinned[p2];
  if(pt){pt.editors=s.editors.size;pt.edits=s.edits;const ret=Object.values(s.ret).filter(ts=>ts.length>1).length;pt.isRet=ret;}
  Object.keys(sustained).forEach(k=>{if(now-sustained[k].last>10800000)delete sustained[k];});
}

function updSustPanel(){
  const sorted=Object.values(sustained).filter(s=>(Date.now()-s.first)/60000>=5&&s.edits>=3).sort((a,b)=>b.score-a.score).slice(0,6);
  const el=document.getElementById('feedSust');if(!el)return;
  if(!sorted.length){el.innerHTML='';return;}
  el.innerHTML='';
  sorted.forEach(s=>{
    const sc=Math.round(s.score);const col=sc>=40?'#ff4757':sc>=20?'#ffc800':'#64ffda';
    const ageM=Math.round((Date.now()-s.first)/60000);
    const ageStr=ageM>=60?Math.floor(ageM/60)+'г':ageM+'хв';
    const short=s.title?s.title.slice(0,24):Object.keys(sustained).find(k=>sustained[k]===s)||'';
    const sh=short.length>22?short.slice(0,22)+'…':short;
    const row=document.createElement('div');row.className='si';
    row.addEventListener('click',()=>window.open(s.url,'_blank'));
    row.innerHTML='<div class="si-sc" style="color:'+col+'">'+sc+'</div>'
      +'<div style="flex:1;min-width:0"><div class="si-nm">'+sh+'</div>'
      +'<div class="si-me"><span>'+ageStr+'</span><span>'+s.edits+'пр</span><span>👥'+s.editors.size+'</span></div></div>'
      +'<div class="si-bar"><div class="si-fill" style="width:'+Math.min(sc,100)+'%;background:'+col+'"></div></div>';
    el.appendChild(row);
  });
  document.getElementById('sCnt').textContent=sorted.length;
  // Refresh pinned timers too
  renderPinned();
}

// ── PROCESS EDIT ──
function processEdit(data){
  const title=data.title||'',wiki=data.wiki||'enwiki';
  const user=data.user||'',isBot=!!data.bot,isNew=data.type==='new';
  const lang=(wiki.replace('wiki','')||'en').slice(0,8);
  const url=getUrl(title,wiki);
  totalEdits++;editsTs.push(Date.now());
  langs[lang]=(langs[lang]||0)+1;
  if(!articles[title])articles[title]={count:0,editors:new Set(),wiki,url,type:'',lang};
  articles[title].count++;articles[title].lang=lang;
  if(user&&!isBot)articles[title].editors.add(user);
  updSustained(title,wiki,user,isBot);

  // Anomaly window
  const key=wiki+':'+title,now=Date.now();
  if(!anomWin[key])anomWin[key]={ts60:[],u60:new Set(),ts300:[],u300:new Set(),fM:false,fS:false};
  const w=anomWin[key];
  w.ts60.push(now);w.ts300.push(now);
  if(user&&!isBot){w.u60.add(user);w.u300.add(user);}
  w.ts60=w.ts60.filter(t=>now-t<60000);w.ts300=w.ts300.filter(t=>now-t<300000);
  if(w.ts60.length===0)w.u60=new Set();
  if(w.ts300.length===0){w.u300=new Set();w.fM=false;w.fS=false;}
  const h60=w.ts60.length,u60=w.u60.size,h300=w.ts300.length,u300=w.u300.size;
  const ir=isRes(title);
  if(u300>=2&&h300>=2&&!w.fM){
    w.fM=true;addAnom(title,url,lang,h300,u300,ir?'res':'mul');
  } else if(h60>=4&&u60<=1&&!w.fS){
    w.fS=true;addAnom(title,url,lang,h60,1,'sng');
  } else {
    // Update existing pinned if already there
    const pk=wiki+':'+title;const p2=Object.keys(pinned).find(k=>k.includes(title));
    if(pinned[pk]||p2){upsertPinned(title,wiki,pinned[pk]?.type||'mul',h300||h60,u300||u60,lang,url);}
  }

  if(langF!=='all'&&lang!==langF)return;
  const count=articles[title].count;
  const tags=[
    isBot?'<span class="tg tg-b">bot</span>':(!user||/^\d+\.\d+/.test(user))?'<span class="tg tg-a">anon</span>':'<span class="tg tg-u">user</span>',
    isNew?'<span class="tg tg-n">new</span>':'',
    articles[title].editors.size>=2?'<span class="tg tg-m">👥'+articles[title].editors.size+'</span>':'',
  ].join('');
  const cls=count>=8?'spike':count>=4?'high':'';
  const html='<div class="fi '+cls+'" onclick="window.open(\''+url+'\',\'_blank\')">'
    +'<a class="fi-t" href="'+url+'" target="_blank" onclick="event.stopPropagation()">'+title+'</a>'
    +'<div class="fi-m">'+tags+'<span class="fi-lang">'+lang+'</span></div></div>';
  const feed=document.getElementById('feedRecent');
  if(feed){
    const ph=feed.querySelector('.hint');if(ph)feed.removeChild(ph);
    feed.innerHTML=html+feed.innerHTML;
    const ch=Array.from(feed.children);if(ch.length>60)ch.slice(60).forEach(el=>feed.removeChild(el));
  }
  document.getElementById('lt').textContent=ts();
  if(totalEdits%8===0)updLangs();
  updHdr();updSpark();updHeatmap();
}

function updLangs(){
  const sorted=Object.entries(langs).sort((a,b)=>b[1]-a[1]).slice(0,10);if(!sorted.length)return;
  const mx=sorted[0][1];
  const cols=['#64ffda','#48cae4','#0096c7','#023e8a','#7209b7','#b5179e','#f72585','#ff4757','#ffc800','#06d6a0'];
  document.getElementById('feedLang').innerHTML=sorted.map(([l,cnt],i)=>
    '<div class="li"><div class="li-c">'+l+'</div>'
    +'<div class="li-t"><div class="li-f" style="width:'+(cnt/mx*100).toFixed(0)+'%;background:'+(cols[i]||'#64ffda')+'"></div></div>'
    +'<div class="li-n">'+cnt+'</div></div>'
  ).join('');
}

          +'<button class="ti-btn ti-btn-ai" data-art="'+art.replace(/"/g,'')+'">✦ AI</button></div></div>';

        gb.addEventListener('click',e=>e.stopPropagation());

        ab.addEventListener('click',function(e){e.stopPropagation();openAiModal(art);});
        acts.appendChild(gb);acts.appendChild(ab);
        row.appendChild(nm);row.appendChild(vw);row.appendChild(dl);row.appendChild(acts);

      }
    });
    // Refresh pinned — update trendPct
    Object.values(pinned).forEach(p=>{
      const tr=trendData.find(t=>t.article.toLowerCase()===p.title.toLowerCase());
      if(tr){p.trendPct=tr.delta;p.type='res';}
    });
    renderPinned();
  }catch(e){document.getElementById('tTime').textContent='помилка';}
}

function openAiModal(article){

async function fetchAiCtx(article){
  const [ddg,wiki,gnews]=await Promise.allSettled([
    fetch(PROXY+'/ddg?q='+encodeURIComponent(article+' news')).then(r=>r.json()).catch(()=>({items:[]})),
    fetch('https://en.wikipedia.org/w/api.php?action=query&prop=extracts&exintro=1&exsentences=3&explaintext=1&titles='+encodeURIComponent(article)+'&format=json&origin=*').then(r=>r.json()).catch(()=>null),
    fetch(PROXY+'/gnews?q='+encodeURIComponent(article)).then(r=>r.json()).catch(()=>({items:[]}))
  ]);
  document.getElementById('aimLoad').style.display='none';
  const el=document.getElementById('aimContent');el.style.display='block';
  let html='';
  if(wiki.status==='fulfilled'&&wiki.value){const pg=Object.values(wiki.value.query?.pages||{})[0];if(pg&&pg.extract){const ex=pg.extract.slice(0,300).trim();html+='<div style="margin-bottom:0.85rem"><div class="aim-src" style="color:#64ffda">📖 Wikipedia</div><div style="font-size:0.73rem;color:rgba(255,255,255,0.42);line-height:1.65;font-style:italic">'+ex+(ex.length>=300?'…':'')+'</div></div>';}}
  const ddgI=(ddg.status==='fulfilled'?ddg.value.items||[]:[] ).slice(0,3);
  if(ddgI.length){html+='<div style="margin-bottom:0.85rem"><div class="aim-src" style="color:#ffc800">🦆 DuckDuckGo</div>';ddgI.forEach(it=>{html+='<div class="aim-item"><a href="'+it.url+'" target="_blank">'+it.title+'</a>'+(it.source?'<div class="aim-item-meta">'+it.source+'</div>':'')+'</div>';});html+='</div>';}
  const gn=(gnews.status==='fulfilled'?gnews.value.items||[]:[] ).slice(0,3);
  if(gn.length){html+='<div><div class="aim-src" style="color:#f72585">📰 GNews</div>';gn.forEach(it=>{html+='<div class="aim-item"><a href="'+it.url+'" target="_blank">'+it.title+'</a><div class="aim-item-meta">'+it.source+' · '+it.date+'</div></div>';});html+='</div>';}
  if(!html)html='<div style="color:rgba(255,255,255,0.35)">Нічого не знайдено.</div>';
  html+='<div class="aim-links"><a href="https://en.wikipedia.org/wiki/'+encodeURIComponent(article.replace(/ /g,'_'))+'" target="_blank">→ Wikipedia</a><a href="https://www.google.com/search?q='+encodeURIComponent(article+' '+new Date().getFullYear())+'" target="_blank">→ Google</a></div>';
  el.innerHTML=html;
}

async function loadFromSupabase() {
  try {
    // Завантажуємо останні 50 аномалій за останні 6 годин
    const since = new Date(Date.now() - 6*3600000).toISOString();
    const r = await fetch(
      SB_URL + '/rest/v1/anomalies?created_at=gte.' + since + '&order=created_at.desc&limit=50',
      { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } }
    );
    const rows = await r.json();
    if (!Array.isArray(rows) || !rows.length) return;

    console.log('Loaded', rows.length, 'anomalies from Supabase');

    rows.forEach(row => {
      // Відновлюємо pinned картки
      const key = row.wiki + ':' + row.title;
      const created = new Date(row.created_at).getTime();
      const ageMs = Date.now() - created;

      // Тільки якщо молодші 2 годин
      if (ageMs > 7200000) return;

      if (!pinned[key]) {
        pinned[key] = {
          key,
          title: row.title,
          wiki: row.wiki || row.lang + 'wiki',
          type: row.type || 'sng',
          edits: row.edits || 0,
          editors: row.editors || 0,
          firstSeen: created,
          lastSeen: created,
          url: row.url || getUrl(row.title, row.wiki || row.lang + 'wiki'),
          lang: row.lang || 'en',
          score: row.score || 0,
          isWar: false,
          isRet: 0,
          isProt: false,
          desc: '',
          pvText: '',
          badges: row.article_type
            ? '<span class="pb2" style="background:rgba(100,255,218,0.1);color:#64ffda;border:1px solid rgba(100,255,218,0.2)">' + row.article_type + '</span>'
            : '',
          trendPct: row.trend_pct
        };
      }

      // Рахуємо лічильники
      anomCnt++;
      if (row.type === 'res') resCnt++;
      else if (row.type === 'mul') mulCnt++;
      else sngCnt++;

      // Додаємо в stream list
      const url = row.url || getUrl(row.title, row.lang || 'en');
      const icon = row.type === 'res' ? '★' : row.type === 'mul' ? '👥' : '⚡';
      const col = row.type === 'res' ? '#f72585' : row.type === 'mul' ? '#ffc800' : '#ff4757';
      const timeStr = new Date(row.created_at).toLocaleTimeString('uk-UA', {hour:'2-digit',minute:'2-digit'});
      const row2 = document.createElement('div');
      row2.className = 'al';
      row2.addEventListener('click', () => window.open(url, '_blank'));
      row2.innerHTML = '<div class="al-label" style="color:' + col + '">' + icon + ' ' + (row.lang||'en') + '</div>'
        + '<div class="al-title">' + row.title + '</div>'
        + '<div class="al-meta">' + timeStr + '</div>';
      const sl = document.getElementById('streamList');
      if (sl) sl.appendChild(row2);
      streamCnt++;
    });

    document.getElementById('streamCnt').textContent = streamCnt;
    updHdr();
    renderPinned();
    console.log('Restored', Object.keys(pinned).length, 'pinned cards from history');
  } catch(e) {
    console.log('Supabase load error:', e.message);
  }
}

function connect(){
  document.getElementById('dot').className='ldot wait';document.getElementById('stxt').textContent='connecting';
  if(es)try{es.close();}catch(e){}
  es=new EventSource(PROXY);
  es.onopen=()=>{document.getElementById('dot').className='ldot';document.getElementById('stxt').textContent='live';lastMsg=Date.now();};
  es.onmessage=e=>{lastMsg=Date.now();try{const d=JSON.parse(e.data);if(d.type==='edit'||d.type==='new')processEdit(d);}catch(err){}};
  es.onerror=()=>{document.getElementById('dot').className='ldot off';document.getElementById('stxt').textContent='reconnecting';es.close();setTimeout(connect,5000);};
}
